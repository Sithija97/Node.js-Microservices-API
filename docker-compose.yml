version: '3.8'

services:
  mongo:
    image: mongodb/mongodb-community-server:latest
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "3000:3000"
    # environment:
    #   - MONGO_URL=mongodb://mongo:27017/userdb
    depends_on:
      - mongo

  task-service:
    build: ./task-service
    container_name: task-service
    ports:
      - "3001:3001"
    # environment:
    #   - MONGO_URL=mongodb://mongo:27017/taskdb
    depends_on:
      - mongo

volumes:
  mongo-data: